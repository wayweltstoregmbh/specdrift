name: "SpecDrift Gate"
description: >-
  Block merges when AI-implemented changes lose or distort spec requirements.
  Claim-level provenance, enforced verdicts, drift reports — no LLM calls, no secrets.
branding:
  icon: "check-circle"
  color: "purple"

inputs:
  fail-on:
    description: "Which drift blocks the merge: missing, distorted or both"
    required: false
    default: "both"
  min-coverage:
    description: "Minimum coverage percent (0-100)"
    required: false
    default: "0"
  max-uncovered:
    description: "Maximum changed files without spec coverage (empty = warn only)"
    required: false
    default: ""
  working-directory:
    description: "Directory containing specdrift.claims.json (monorepo support)"
    required: false
    default: "."
  claims:
    description: "Path to the claim store"
    required: false
    default: "specdrift.claims.json"
  verdicts:
    description: "Path to the verdicts file"
    required: false
    default: "specdrift.verdicts.json"

runs:
  using: "composite"
  steps:
    - name: Detect changed files
      id: changed
      shell: bash
      run: |
        CHANGED=""
        if [ -n "${GITHUB_BASE_REF:-}" ]; then
          git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF" || true
          CHANGED=$(git diff --name-only "origin/$GITHUB_BASE_REF"...HEAD 2>/dev/null | paste -sd, - || true)
        fi
        echo "files=$CHANGED" >> "$GITHUB_OUTPUT"

    - name: Run SpecDrift gate
      id: gate
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        ARGS=(gate --fail-on "${{ inputs.fail-on }}" --min-coverage "${{ inputs.min-coverage }}"
          --claims "${{ inputs.claims }}" --verdicts "${{ inputs.verdicts }}"
          --out specdrift.gate.json --comment-out specdrift.comment.md --json)
        if [ -n "${{ inputs.max-uncovered }}" ]; then
          ARGS+=(--max-uncovered "${{ inputs.max-uncovered }}")
        fi
        if [ -n "${{ steps.changed.outputs.files }}" ]; then
          ARGS+=(--changed "${{ steps.changed.outputs.files }}")
        fi
        node "${{ github.action_path }}/bin/specdrift.js" "${ARGS[@]}"

    - name: Comment on pull request
      if: >-
        always() && github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require("fs");
          const path = require("path");
          const dir = "${{ inputs.working-directory }}";
          const file = path.join(dir, "specdrift.comment.md");
          if (!fs.existsSync(file)) return;
          const body = fs.readFileSync(file, "utf8");
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number
          });
          const marker = "## SpecDrift Report";
          const existing = comments.find(
            (c) => c.user.type === "Bot" && c.body.startsWith(marker)
          );
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
          }
